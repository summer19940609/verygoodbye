name: Update Download Versions

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-download-versions
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # FlClash
      - name: Get FlClash version
        id: flclash
        run: |
          VERSION=$(curl -Ls -o /dev/null -w "%{url_effective}" \
          https://github.com/chen08209/FlClash/releases/latest \
          | sed 's#.*/tag/v##')

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Optimizer
      - name: Get Optimizer version
        id: optimizer
        run: |
          VERSION=$(curl -Ls -o /dev/null -w "%{url_effective}" \
          https://github.com/hellzerg/optimizer/releases/latest \
          | sed 's#.*/tag/##')

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # 更新文件
      - name: Update index.html
        run: |
          FLCLASH="${{ steps.flclash.outputs.version }}"
          OPTIMIZER="${{ steps.optimizer.outputs.version }}"

          # FlClash
          sed -i -E \
          "s#(chen08209/FlClash/releases/download/v)[0-9]+\.[0-9]+\.[0-9]+#\1${FLCLASH}#g" \
          index.html

          sed -i -E \
          "s#(FlClash-)[0-9]+\.[0-9]+\.[0-9]+#\1${FLCLASH}#g" \
          index.html

          # Optimizer
          sed -i -E \
          "s#(hellzerg/optimizer/releases/download/)[0-9]+\.[0-9]+#\1${OPTIMIZER}#g" \
          index.html

          sed -i -E \
          "s#(Optimizer-)[0-9]+\.[0-9]+#\1${OPTIMIZER}#g" \
          index.html

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

          git add index.html
          git commit -m "Auto update download versions"
          git push
