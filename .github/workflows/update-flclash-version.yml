name: Update FlClash Version

on:
  schedule:
    # 每天东京时间 09:00，也就是 UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest FlClash version
        id: flclash
        shell: bash
        run: |
          VERSION=$(curl -Ls -o /dev/null -w "%{url_effective}" \
            https://github.com/chen08209/FlClash/releases/latest | sed 's#.*/tag/v##')

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Latest FlClash version: ${VERSION}"

      - name: Update index.html
        shell: bash
        run: |
          VERSION="${{ steps.flclash.outputs.version }}"

          # 更新下载路径里的版本号：
          # /releases/download/v0.8.91/ -> /releases/download/v0.8.92/
          perl -0pi -e "s#(chen08209/FlClash/releases/download/v)[0-9]+\.[0-9]+\.[0-9]+#\${1}${VERSION}#g" index.html

          # 更新文件名里的版本号：
          # FlClash-0.8.91-xxx -> FlClash-0.8.92-xxx
          perl -0pi -e "s#(FlClash-)[0-9]+\.[0-9]+\.[0-9]+#\${1}${VERSION}#g" index.html

          echo "Current FlClash links:"
          grep -n "FlClash" index.html || true

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "Update FlClash version to ${{ steps.flclash.outputs.version }}"
          git push
