name: Update FlClash Version

on:
  schedule:
    # 每天东京时间 09:00 运行
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Get latest FlClash version
        id: flclash
        shell: bash
        run: |
          LATEST_TAG=$(curl -Ls -o /dev/null -w "%{url_effective}" \
            https://github.com/chen08209/FlClash/releases/latest | sed 's#.*/tag/v##')

          echo "version=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest FlClash version: $LATEST_TAG"

      - name: Update index.html
        shell: bash
        run: |
          VERSION="${{ steps.flclash.outputs.version }}"

          # 匹配类似 0.8.92 的版本号并替换
          sed -i -E "s/FlClash[[:space:]]*[vV]?[0-9]+\.[0-9]+\.[0-9]+/FlClash ${VERSION}/g" index.html
          sed -i -E "s/flash[[:space:]]*[vV]?[0-9]+\.[0-9]+\.[0-9]+/flash ${VERSION}/g" index.html
          sed -i -E "s/flclash[[:space:]]*[vV]?[0-9]+\.[0-9]+\.[0-9]+/flclash ${VERSION}/g" index.html

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add index.html
          git commit -m "Update FlClash version to ${{ steps.flclash.outputs.version }}"
          git push
