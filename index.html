<!DOCTYPE html>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		:root {
			--bg: #f4f7fb;
			--card: #ffffff;
			--text: #26384a;
			--muted: #6b7c8f;
			--green: #43a957;
			--green-hover: #349347;
			--blue-bg: #e8f4ff;
			--blue-border: #b9dcff;
			--blue-text: #1266c3;
			--blue-hover: #d8edff;
			--shadow: 0 8px 24px rgba(38, 56, 74, .08);
			--radius: 14px;
		}

		body {
			min-height: 100vh;
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
				"Microsoft YaHei", Arial, sans-serif;
			background: var(--bg);
			color: var(--text);
			padding: 32px 16px;
		}

		main {
			width: min(80dvw, 1280px);
			margin: 0 auto;
		}

		.section {
			background: var(--card);
			border-radius: 20px;
			padding: 28px;
			margin-bottom: 28px;
			box-shadow: var(--shadow);
		}

		h1 {
			text-align: center;
			font-size: clamp(28px, 4vw, 44px);
			line-height: 1.2;
			letter-spacing: .04em;
			margin-bottom: 24px;
			color: var(--text);
		}

		.nav-container {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
			gap: 12px;
		}

		button {
			min-height: 50px;
			padding: 12px 16px;
			border: 0;
			border-radius: var(--radius);
			background: var(--green);
			color: #fff;
			font-size: 16px;
			font-weight: 600;
			line-height: 1.35;
			cursor: pointer;
			transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
			box-shadow: 0 4px 10px rgba(67, 169, 87, .18);
		}

		button:hover {
			background: var(--green-hover);
			transform: translateY(-2px);
			box-shadow: 0 8px 18px rgba(67, 169, 87, .25);
		}

		button:active {
			transform: translateY(0);
			box-shadow: none;
		}

		button:focus-visible {
			outline: 3px solid rgba(67, 169, 87, .28);
			outline-offset: 3px;
		}

		.download-section button {
			background: var(--blue-bg);
			color: var(--blue-text);
			border: 1px solid var(--blue-border);
			box-shadow: none;
		}

		.download-section button:hover {
			background: var(--blue-hover);
			box-shadow: 0 8px 18px rgba(18, 102, 195, .12);
		}

		.download-section button:focus-visible {
			outline-color: rgba(18, 102, 195, .24);
		}

		@media (max-width: 900px) {
			main {
				width: 100%;
			}

			body {
				padding: 16px 10px;
			}

			.section {
				padding: 20px 14px;
				border-radius: 16px;
			}

			.nav-container {
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 10px;
			}

			button {
				font-size: 15px;
				min-height: 48px;
				padding: 10px 12px;
			}
		}

		@media (max-width: 420px) {
			.nav-container {
				grid-template-columns: 1fr;
			}
		}
	</style>

	<script>
		document.addEventListener("click", e => {
			const button = e.target.closest("button[value]");
			if (button) location.href = button.value;
		});
	</script>
</head>
