		* {

		:root {
			--bg: #f4f7fb;
			--card: #fff;
			--text: #26384a;

			--green: #43a957;
			--green-hover: #369148;

			--blue-bg: #e9f4ff;
			--blue-border: #bddcff;
			--blue-text: #1565c0;
			--blue-hover: #d8edff;
		}

		body {
			min-height: 100vh;
			font-family:
				-apple-system,
				BlinkMacSystemFont,
				"Segoe UI",
				"PingFang SC",
				"Microsoft YaHei",

			background: var(--bg);
			color: var(--text);
			padding: 18px;
		}

		main {
			width: 100%;
			max-width: 1280px;
			margin: 0 auto;
		}

		.section {
			background: var(--card);
			padding: 28px;
			margin-bottom: 28px;
		}

		h2 {
			text-align: center;
    		margin-bottom: 16px;
		}

		.nav-container {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
			gap: 14px;
		}

		button {
			min-height: 56px;
			padding: 14px 18px;
			border: 0;
			background: var(--green);
			color: #fff;
			font-size: 14px;
			font-weight: 600;
			line-height: 1.4;
			cursor: pointer;
		}

		.download-section button {
			background: var(--blue-bg);
			color: var(--blue-text);
			border: 1px solid var(--blue-border);
		}

		@media (max-width: 768px) {
			body {
				padding: 12px;
			}

			.section {
				padding: 18px;
			}

			.nav-container {
				grid-template-columns: repeat(2, minmax(0, 1fr));
				gap: 10px;
			}

			button {
				min-height: 50px;
				font-size: 14px;
				padding: 12px;
			}
		}

		@media (max-width: 420px) {
			.nav-container {
				grid-template-columns: 1fr;
			}
		}
	</style>

	<script>
		document.addEventListener("click", e => {
			const button = e.target.closest("button[value]");
			if (button) location.href = button.value;
		});
	</script>
</head>
