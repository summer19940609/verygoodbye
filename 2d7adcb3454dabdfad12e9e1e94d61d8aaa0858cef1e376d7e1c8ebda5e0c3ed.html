<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>上传到 GitHub Private Gist</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    input, textarea, button {
      width: 100%;
      box-sizing: border-box;
      margin-top: 8px;
      margin-bottom: 18px;
      padding: 10px;
      font-size: 14px;
    }

    textarea {
      height: 360px;
      font-family: Consolas, Monaco, monospace;
    }

    button {
      cursor: pointer;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .result {
      white-space: pre-wrap;
      background: #f3f4f6;
      padding: 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <h2>上传到 GitHub Private Gist</h2>

  <label>GitHub Token</label>
  <input id="token" type="password" placeholder="ghp_xxx 或 github_pat_xxx" />

  <label>Filename</label>
  <input id="filename" type="text" placeholder="example.txt" />

  <label>文件内容</label>
  <textarea id="content" placeholder="输入要上传的内容"></textarea>

  <button id="uploadBtn" onclick="uploadGist()">上传为 Private Gist</button>

  <div id="result" class="result"></div>

  <script>
    async function uploadGist() {
      const token = document.getElementById('token').value;
      const filename = document.getElementById('filename').value;
      const content = document.getElementById('content').value;
      const result = document.getElementById('result');
      const btn = document.getElementById('uploadBtn');

      if (!token || !filename || !content) {
        result.textContent = '请填写 token、filename 和文件内容';
        return;
      }

      btn.disabled = true;
      result.textContent = '上传中...';

      try {
        const res = await fetch('https://api.github.com/gists', {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            description: `Uploaded ${filename}`,
            public: false,
            files: {
              [filename]: {
                content
              }
            }
          })
        });

        const data = await res.json();

        if (!res.ok) {
          result.textContent = `上传失败：\n${JSON.stringify(data, null, 2)}`;
          return;
        }

        result.innerHTML = `
上传成功！

Gist 地址：
<a href="${data.html_url}" target="_blank">${data.html_url}</a>

Raw 地址：
<a href="${Object.values(data.files)[0].raw_url}" target="_blank">${Object.values(data.files)[0].raw_url}</a>
        `;
      } catch (err) {
        result.textContent = `请求失败：${err.message}`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
