<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上传文件到指定 Gist</title>

<style>
* {
  box-sizing: border-box;
}

body {
  max-width: 1000px;
  margin: 40px auto;
  padding: 0 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

h2 {
  margin-bottom: 24px;
}

label {
  display: block;
  margin-bottom: 6px;
  font-weight: 600;
}

input,
textarea,
button {
  width: 100%;
  font-size: 14px;
}

input,
textarea {
  padding: 10px;
  margin-bottom: 20px;
  border: 1px solid #d0d7de;
  border-radius: 6px;
}

textarea {
  min-height: 450px;
  font-family: Menlo, Monaco, Consolas, monospace;
  resize: vertical;
}

button {
  padding: 12px;
  border: none;
  border-radius: 6px;
  background: #24292f;
  color: #fff;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
}

button:hover {
  opacity: .9;
}

button:disabled {
  opacity: .5;
  cursor: not-allowed;
}

.result {
  margin-top: 20px;
  padding: 20px;
  background: #f6f8fa;
  border-radius: 8px;
  line-height: 1.8;
  max-width: 100%;
  overflow-wrap: anywhere;
  word-break: break-word;
}

.result a {
  color: #0969da;
  text-decoration: none;
  overflow-wrap: anywhere;
  word-break: break-all;
}

.result a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h2>上传文件到指定 Gist</h2>

<label>GitHub Token</label>
<input
  id="token"
  type="password"
  placeholder="ghp_xxx 或 github_pat_xxx"
/>

<label>文件名</label>
<input
  id="filename"
  type="text"
  placeholder="例如：config.yaml 或 rules/openai.list"
/>

<label>文件内容</label>
<textarea
  id="content"
  placeholder="输入文件内容"
></textarea>

<button id="uploadBtn">
上传到 Gist
</button>

<div id="result" class="result"></div>

<script>
const GIST_ID = '94872a89c020535b388e52df36ef5d14';

const uploadBtn = document.getElementById('uploadBtn');

uploadBtn.addEventListener('click', uploadFile);

async function uploadFile() {
  const token = document.getElementById('token').value.trim();
  const filename = document.getElementById('filename').value.trim();
  const content = document.getElementById('content').value;
  const result = document.getElementById('result');

  if (!token) {
    result.textContent = '请输入 GitHub Token';
    return;
  }

  if (!filename) {
    result.textContent = '请输入文件名';
    return;
  }

  uploadBtn.disabled = true;
  result.textContent = '上传中...';

  try {
    const response = await fetch(
      `https://api.github.com/gists/${GIST_ID}`,
      {
        method: 'PATCH',
        headers: {
          Authorization: `Bearer ${token}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          files: {
            [filename]: {
              content
            }
          }
        })
      }
    );

    const data = await response.json();

    if (!response.ok) {
      result.textContent =
        '上传失败：\n' +
        JSON.stringify(data, null, 2);
      return;
    }

    const uploadedFile = data.files[filename];

    result.innerHTML = `
      <h3>上传成功</h3>

      <p>
        <strong>Gist 地址：</strong><br>
        <a href="${data.html_url}" target="_blank">
          ${data.html_url}
        </a>
      </p>

      <p>
        <strong>文件名：</strong><br>
        ${filename}
      </p>

      <p>
        <strong>Raw 地址：</strong><br>
        ${
          uploadedFile?.raw_url
            ? `
            <a href="${uploadedFile.raw_url}" target="_blank">
              ${uploadedFile.raw_url}
            </a>
            `
            : '请刷新 Gist 页面查看'
        }
      </p>
    `;
  } catch (error) {
    result.textContent = '请求失败：' + error.message;
  } finally {
    uploadBtn.disabled = false;
  }
}
</script>

</body>
</html>
